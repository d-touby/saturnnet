<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SaturnNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%231e6eff'/><circle cx='50' cy='50' r='15' fill='%23d4a574'/></svg>">
</head>
<body>
  <div class="loader"><div class="loader-content"><div class="loader-logo"></div><div class="loader-text">SaturnNet</div></div></div>

  <section class="login-container" style="background: linear-gradient(135deg, #030810 0%, #0a1628 100%);">
    <div class="login-card">
      <div class="login-header">
        <span class="badge badge-danger mb-3">Admin Panel</span>
        <div class="logo" style="width: 70px; height: 70px; margin: 0 auto 1rem;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="8"/><ellipse cx="12" cy="12" rx="10" ry="4" fill="none" stroke="white" stroke-width="1.5" transform="rotate(-20 12 12)"/></svg>
        </div>
        <h2>Admin Login</h2>
        <p>Masuk ke panel administrator</p>
      </div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label class="form-label">Email Admin</label>
          <input type="email" class="form-control" id="admin-email" placeholder="admin@saturnnet.id" required>
        </div>

        <div class="form-group">
          <label class="form-label">Kata Sandi</label>
          <input type="password" class="form-control" id="admin-password" placeholder="admin2025" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Masuk</button>
      </form>

      <div class="login-footer">
        <a href="../login.html">← Kembali ke Login Pelanggan</a>
      </div>
      
      <div class="mt-3 text-center">
        <p class="text-secondary" style="font-size: 0.8rem;">Demo: admin@saturnnet.id / admin2025</p>
      </div>
    </div>
  </section>

  <script src="../assets/js/main.js" defer></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      
      const result = login(email, password, 'admin');
      
      if (result.success) {
        window.location.href = result.redirect;
      } else {
        alert(result.message || 'Login gagal');
      }
    });
  </script>
</body>
</html>
